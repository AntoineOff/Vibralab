<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - DarkStream</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Barre de navigation -->
    <header>
        <nav class="navbar">
            <div class="logo">DarkStream</div>
            <ul class="nav-links">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Séries</a></li>
                <li><a href="#">Films</a></li>
                <li><a href="#">Nouveautés</a></li>
            </ul>
        </nav>
    </header>

    <!-- Bannière principale -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Les Ombres du Destin</h1>
            <p>Un thriller palpitant où chaque choix scelle votre destin.</p>
            <div class="hero-buttons">
                <button class="btn play-btn">Lecture</button>
                <button class="btn info-btn">Plus d'infos</button>
            </div>
        </div>
    </section>

    <!-- Sections de contenu -->
    <section class="content-section">
        <h2>Tendances actuelles</h2>
        <div class="carousel">
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76ff?q=80&w=1925&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1485846234645-a70785ea291d?q=80&w=1920&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1534972195531-d756b9bfa9f2?q=80&w=1920&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1509343256512-d77a5cb3791b?q=80&w=1920&auto=format&fit=crop');"></div>
        </div>
    </section>

    <section class="content-section">
        <h2>Recommandé pour vous</h2>
        <div class="carousel">
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76ff?q=80&w=1925&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1485846234645-a70785ea291d?q=80&w=1920&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1534972195531-d756b9bfa9f2?q=80&w=1920&auto=format&fit=crop');"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1509343256512-d77a5cb3791b?q=80&w=1920&auto=format&fit=crop');"></div>
        </div>
    </section>

    <footer>
        <p>© 2025 DarkStream. Tous droits réservés.</p>
